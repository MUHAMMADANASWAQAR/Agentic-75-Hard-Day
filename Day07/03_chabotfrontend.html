<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0b0e14;
      --surface:   #13181f;
      --border:    #1f2733;
      --accent:    #38bdf8;
      --accent2:   #818cf8;
      --user-bg:   #1a2535;
      --bot-bg:    #151b24;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    18px;
      --font:      'Sora', sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --shadow:    0 8px 40px rgba(0,0,0,.55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .shell {
      position: relative;
      z-index: 1;
      width: min(780px, 100%);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(56,189,248,.3);
    }
    .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
    .header-info p  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22d3ee;
      margin-left: auto;
      box-shadow: 0 0 8px #22d3ee;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(.8); }
    }
    #thread-chip {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--border);
      padding: 3px 9px;
      border-radius: 99px;
      cursor: pointer;
      transition: color .2s;
      white-space: nowrap;
    }
    #thread-chip:hover { color: var(--accent); }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .msg.bot  .msg-avatar { background: linear-gradient(135deg,var(--accent),var(--accent2)); }
    .msg.user .msg-avatar { background: var(--user-bg); border: 1px solid var(--border); }
    .bubble {
      max-width: min(72%, 520px);
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg.bot  .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(56,189,248,.18);
      border-bottom-right-radius: 4px;
    }
    .bubble time {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      font-family: var(--mono);
    }
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce .9s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .welcome .icon { font-size: 40px; margin-bottom: 12px; }
    .welcome strong { color: var(--text); font-weight: 600; display: block; font-size: 16px; margin-bottom: 6px; }
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      min-height: 44px;
      max-height: 160px;
      padding: 11px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color .2s;
      overflow-y: auto;
      line-height: 1.5;
    }
    #input::placeholder { color: var(--muted); }
    #input:focus { border-color: rgba(56,189,248,.45); }
    #send-btn {
      width: 44px; height: 44px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
    }
    #send-btn:hover  { transform: scale(1.07); }
    #send-btn:active { transform: scale(.95); opacity: .9; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    #new-chat-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-family: var(--font);
      padding: 5px 12px;
      border-radius: 99px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }
    #new-chat-btn:hover { border-color: var(--accent); color: var(--accent); }
    #toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 8px 18px;
      border-radius: 99px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, transform .3s;
      z-index: 99;
      font-family: var(--mono);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 480px) {
      header { padding: 14px 16px; }
      #messages { padding: 20px 14px; gap: 14px; }
      .input-bar { padding: 12px 14px; gap: 8px; }
      .bubble { font-size: 13.5px; }
      #thread-chip { display: none; }
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1>AI Assistant</h1>
      <p>Powered by LangGraph + GPT</p>
    </div>
    <span id="thread-chip" title="Click to copy thread ID">thread: —</span>
    <button id="new-chat-btn">+ New Chat</button>
    <div class="status-dot"></div>
  </header>

  <div id="messages">
    <div class="welcome">
      <div class="icon">✦</div>
      <strong>How can I help you today?</strong>
      Ask me anything — I remember our conversation.
    </div>
  </div>

  <div class="input-bar">
    <textarea
      id="input"
      rows="1"
      placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
    ></textarea>
    <button id="send-btn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
  const API_BASE = "http://localhost:8000";

  let threadId = generateThreadId();
  let busy = false;

  const msgsEl     = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");
  const chipEl     = document.getElementById("thread-chip");
  const newChatBtn = document.getElementById("new-chat-btn");
  const toastEl    = document.getElementById("toast");

  updateChip();

  function generateThreadId() {
    return "t-" + Math.random().toString(36).slice(2, 8);
  }
  function updateChip() {
    chipEl.textContent = "thread: " + threadId;
  }
  function now() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2200);
  }
  function removeWelcome() {
    const w = msgsEl.querySelector(".welcome");
    if (w) w.remove();
  }
  function escapeHtml(str) {
    return str
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function appendMessage(role, text) {
    removeWelcome();
    const isUser = role === "user";
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${isUser ? "🧑" : "🤖"}</div>
      <div class="bubble">
        ${escapeHtml(text).replace(/\n/g, "<br>")}
        <time>${now()}</time>
      </div>`;
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function showTyping() {
    removeWelcome();
    const div = document.createElement("div");
    div.className = "msg bot typing";
    div.id = "typing-indicator";
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function hideTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  });
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener("click", sendMessage);

  chipEl.addEventListener("click", () => {
    navigator.clipboard.writeText(threadId).catch(() => {});
    showToast("Thread ID copied!");
  });

  newChatBtn.addEventListener("click", () => {
    if (busy) return;
    threadId = generateThreadId();
    updateChip();
    msgsEl.innerHTML = `
      <div class="welcome">
        <div class="icon">✦</div>
        <strong>New conversation started</strong>
        I have no memory of the previous chat.
      </div>`;
    inputEl.value = "";
    inputEl.style.height = "auto";
    showToast("New chat — " + threadId);
  });

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    appendMessage("user", text);
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, thread_id: threadId }),
      });
      hideTyping();
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        appendMessage("bot", "⚠️ Error: " + (err.detail || res.statusText));
      } else {
        const data = await res.json();
        appendMessage("bot", data.reply);
      }
    } catch (err) {
      hideTyping();
      appendMessage("bot", "⚠️ Could not reach the server. Make sure FastAPI is running on port 8000.");
      console.error(err);
    } finally {
      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
